# Tier-1 collapse blocklist. CODEOWNERS-protected (per spec line 260).
#
# Hosts in this list collapse multiple unrelated startup post-mortems onto a
# single registrable_domain (e.g. every founder pulse post on linkedin.com
# would resolve to one canonical_id). Tier-1 entity resolution treats them as
# `is_platform=True` and demotes the row to tier-2 (`name::sector`) so each
# startup gets its own canonical_id.
#
# Consumed by `slopmortem/corpus/entity_resolution.py` only. The curated
# source does NOT drop these — operator-vouched entries are always fetched.
#
# Note: tldextract returns the registrable domain, so `username.medium.com`
# collapses to `medium.com` and is correctly demoted. Custom-domain Substacks
# (`blog.foo.com` -> Substack hosting) are NOT detected by domain alone and
# rely on the tier-2/3 tiebreaker (see spec line 263).
version: "1"
domains:
  - medium.com
  - substack.com
  - ghost.io
  - wordpress.com
  - blogspot.com
  - notion.site
  - dev.to
  - github.io
  - hashnode.com
  - mirror.xyz
  - beehiiv.com
  - buttondown.email
  - linkedin.com
  - twitter.com
  - x.com
  - posthaven.com
  - bearblog.dev
  - write.as
  - wikipedia.org
