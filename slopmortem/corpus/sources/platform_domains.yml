# Platform-domain blocklist — CODEOWNERS-protected (per spec line 260).
#
# Hosts in this list collapse multiple unrelated startup post-mortems onto a
# single registrable_domain — e.g. every founder pulse post on linkedin.com/pulse
# would resolve to one canonical_id. The curated source drops any row whose
# registrable_domain matches; tier-1 entity resolution skips the same set.
#
# Note: tldextract returns the registrable domain, so `username.medium.com`
# collapses to `medium.com` and is correctly blocklisted. Custom-domain
# Substacks (`blog.foo.com` -> Substack hosting) are NOT detected by domain
# alone and rely on tier-2/3 tiebreaker (see spec line 263).
version: "1"
domains:
  - medium.com
  - substack.com
  - ghost.io
  - wordpress.com
  - blogspot.com
  - notion.site
  - dev.to
  - github.io
  - hashnode.com
  - mirror.xyz
  - beehiiv.com
  - buttondown.email
  - linkedin.com
  - twitter.com
  - x.com
  - posthaven.com
  - bearblog.dev
  - write.as
