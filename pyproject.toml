[project]
name = "slopmortem"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "openai>=1.50",
  "qdrant-client>=1.14",
  "fastembed>=0.4",
  "pydantic>=2.7",
  "pydantic-settings>=2.4",
  "typer>=0.12",
  "trafilatura>=1.10",
  "readability-lxml>=0.8.1",
  "tldextract>=5.1",
  "jsonref>=1.1",
  "jinja2>=3.1",
  "tiktoken>=0.7",
  "binoculars>=0.0.4",
  "lmnr>=0.4",
  "anyio>=4.4",
  "httpx>=0.27",
  "pyyaml>=6.0",
  "tavily-python>=0.5",
]

[project.scripts]
slopmortem = "slopmortem.cli:app"

[dependency-groups]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.24",
  "pytest-recording>=0.13",
  "syrupy>=4.6",
  "jsonschema>=4.23",
  "ruff>=0.6",
  "mypy>=1.11",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC"]
