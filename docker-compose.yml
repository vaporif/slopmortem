services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    # Host port is non-standard (16333) so this container doesn't collide
    # with any pre-existing local Qdrant on the dev box's default 6333.
    # Inside the container, Qdrant still listens on 6333 — only the host
    # publish port is bumped.
    ports: ["16333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
